# -------------------------------------------------------
# pktana release configuration
# Edit these values before running: make pktana
# -------------------------------------------------------

# Upstream version (must match [workspace.package] version in Cargo.toml)
VERSION=0.2.1

# RPM release number – bump this each time you re-package the same version
RELEASE=1

# Target OS family: el7 (RHEL/CentOS 7) or el9 (RHEL/CentOS 9)
OS_TYPE=el9
