name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build documentation site
        run: |
          mkdir -p _site
          cat > _site/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>pktana - Linux Packet Analyzer</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
                      line-height: 1.6;
                      color: #333;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      min-height: 100vh;
                      padding: 20px;
                  }
                  .container {
                      max-width: 900px;
                      margin: 0 auto;
                      background: white;
                      border-radius: 10px;
                      padding: 40px;
                      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
                  }
                  h1 { color: #667eea; margin-bottom: 10px; font-size: 2.5em; }
                  .tagline { color: #666; font-size: 1.2em; margin-bottom: 30px; }
                  .install-box {
                      background: #f5f5f5;
                      border-left: 4px solid #667eea;
                      padding: 20px;
                      margin: 20px 0;
                      border-radius: 5px;
                      font-family: 'Courier New', monospace;
                      overflow-x: auto;
                  }
                  .features {
                      display: grid;
                      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                      gap: 20px;
                      margin: 30px 0;
                  }
                  .feature {
                      padding: 20px;
                      background: #f9f9f9;
                      border-radius: 8px;
                      border: 1px solid #e0e0e0;
                  }
                  .feature h3 { color: #667eea; margin-bottom: 10px; }
                  .buttons { margin: 30px 0; }
                  .btn {
                      display: inline-block;
                      padding: 12px 24px;
                      margin: 5px;
                      background: #667eea;
                      color: white;
                      text-decoration: none;
                      border-radius: 5px;
                      font-weight: bold;
                      transition: background 0.3s;
                  }
                  .btn:hover { background: #5568d3; }
                  .btn-secondary { background: #764ba2; }
                  .btn-secondary:hover { background: #653d8a; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>🔍 pktana</h1>
                  <p class="tagline">Modern Linux packet analyzer & network inspector</p>
                  
                  <div class="buttons">
                      <a href="https://github.com/omnayak27199/pktana" class="btn">View on GitHub</a>
                      <a href="https://github.com/omnayak27199/pktana/releases/latest" class="btn btn-secondary">Download Latest</a>
                  </div>

                  <h2>Installation</h2>
                  <div class="install-box">
                      sudo dnf install https://github.com/omnayak27199/pktana/releases/download/v0.3.0/pktana-0.3.0-1.el9.x86_64.rpm
                  </div>

                  <h2>Features</h2>
                  <div class="features">
                      <div class="feature">
                          <h3>📊 TUI Dashboard</h3>
                          <p>Real-time terminal UI with connection tracking, process mapping, and GeoIP lookups.</p>
                      </div>
                      <div class="feature">
                          <h3>📦 Packet Capture</h3>
                          <p>Capture network traffic with PCAP export support for analysis.</p>
                      </div>
                      <div class="feature">
                          <h3>🔧 ethtool Info</h3>
                          <p>Query NIC details, driver info, link status, and IRQ affinities from sysfs.</p>
                      </div>
                      <div class="feature">
                          <h3>🌍 GeoIP Lookup</h3>
                          <p>Offline IP geolocation using MaxMind GeoLite2 database.</p>
                      </div>
                  </div>

                  <h2>Quick Start</h2>
                  <div class="install-box">
                      pktana --help<br>
                      pktana tui eth0           # TUI dashboard<br>
                      pktana capture eth0        # Capture packets<br>
                      pktana geoip 8.8.8.8       # GeoIP lookup<br>
                      pktana ethtool eth0        # NIC details
                  </div>

                  <h2>Documentation</h2>
                  <p>
                      Full documentation available in the 
                      <a href="https://github.com/omnayak27199/pktana/blob/main/README.md" style="color: #667eea;">README</a>
                  </p>
              </div>
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
